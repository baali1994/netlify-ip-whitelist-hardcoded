<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>IP Whitelist Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 22px;
      background: #f7f7f7;
    }
    .box {
      background: white;
      padding: 18px;
      border-radius: 10px;
      max-width: 1000px;
      margin: auto;
      box-shadow: 0 1px 8px rgba(0,0,0,0.08);
    }
    input {
      padding: 10px;
      margin: 4px;
      min-width: 220px;
      font-size: 15px;
    }
    button {
      padding: 10px 12px;
      margin: 4px;
      cursor: pointer;
      font-size: 15px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      background: white;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 9px;
      text-align: left;
    }
    th {
      background: #efefef;
    }
    .danger {
      background: #d93025;
      color: white;
      border: none;
    }
    .ok {
      background: #137333;
      color: white;
      border: none;
    }
    .warn {
      background: #f9ab00;
      color: black;
      border: none;
    }
    .neutral {
      background: #e8eaed;
      color: #111;
      border: 1px solid #aaa;
    }
    pre {
      background: #111;
      color: #0f0;
      padding: 12px;
      overflow: auto;
      border-radius: 6px;
    }
    .muted {
      color: #555;
      font-size: 13px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
    }

    .auth-box {
      background: white;
      padding: 22px;
      border-radius: 10px;
      max-width: 420px;
      margin: 80px auto;
      box-shadow: 0 1px 8px rgba(0,0,0,0.08);
    }
    .auth-box input {
      width: calc(100% - 30px);
      min-width: 0;
    }
    .auth-error {
      color: #d93025;
      font-size: 13px;
      margin-top: 8px;
      min-height: 18px;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="loginBox" class="auth-box">
    <h2>Admin Login</h2>
    <p class="muted">Enter password to open the admin panel.</p>
    <input id="adminPassword" type="password" placeholder="Password" autocomplete="current-password" />
    <button class="ok" onclick="login()">Login</button>
    <p id="authError" class="auth-error"></p>
  </div>

  <div id="app" class="box hidden">
    <div class="row" style="justify-content: space-between;">
      <h2>IP Whitelist Manager</h2>
      <button class="neutral" onclick="logout()">Logout</button>
    </div>

    <p class="muted">
      Admin page is password protected.
    </p>

    <p><b>Detected IP:</b> <span id="detectedIp">Not checked</span></p>

    <hr />

    <h3>Add current IP</h3>
    <div class="row">
      <input id="currentIp" placeholder="Click Detect IP" />
      <input id="currentLabel" placeholder="Label, e.g. Office PC" />
      <button class="neutral" onclick="detectIp()">Detect IP</button>
      <button class="ok" onclick="addCurrentIp()">Add Current IP</button>
    </div>

    <h3>Add manual IP</h3>
    <div class="row">
      <input id="manualIp" placeholder="IP address, e.g. 103.45.67.89" />
      <input id="manualLabel" placeholder="Label, e.g. Client PC" />
      <button class="ok" onclick="addManualIp()">Add Manual IP</button>
    </div>

    <hr />

    <button onclick="loadIps()">Refresh List</button>

    <table>
      <thead>
        <tr>
          <th>IP</th>
          <th>Label</th>
          <th>Active</th>
          <th>Updated</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="ipRows">
        <tr><td colspan="5">Click Refresh List</td></tr>
      </tbody>
    </table>

    <h3>Result</h3>
    <pre id="result">Ready</pre>
  </div>

  <script>
    const ADMIN_TOKEN = "sb_publishable_zW_eXePChSo8yaTw4aJ8Lg_IUHe9bZK";
    const PAGE_PASSWORD = "protected123";

    function showLogin() {
      document.getElementById("loginBox").classList.remove("hidden");
      document.getElementById("app").classList.add("hidden");
      document.getElementById("adminPassword").focus();
    }

    function showApp() {
      document.getElementById("loginBox").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");
    }

    function login() {
      const password = document.getElementById("adminPassword").value.trim();
      if (password !== PAGE_PASSWORD) {
        document.getElementById("authError").textContent = "Wrong password.";
        return;
      }
      sessionStorage.setItem("adminUnlocked", "true");
      document.getElementById("authError").textContent = "";
      showApp();
      detectIp();
      loadIps();
    }

    function logout() {
      sessionStorage.removeItem("adminUnlocked");
      document.getElementById("adminPassword").value = "";
      showLogin();
      document.getElementById("result").textContent = "Logged out";
    }

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("adminPassword").addEventListener("keydown", event => {
        if (event.key === "Enter") login();
      });

      if (sessionStorage.getItem("adminUnlocked") === "true") {
        showApp();
        detectIp();
        loadIps();
      } else {
        showLogin();
      }
    });

    function show(data) {
      document.getElementById("result").textContent = JSON.stringify(data, null, 2);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function api(action, method = "GET", body = null) {
      const res = await fetch(`/.netlify/functions/ips?action=${encodeURIComponent(action)}`, {
        method,
        headers: {
          "Content-Type": "application/json",
          "x-admin-token": ADMIN_TOKEN
        },
        body: body ? JSON.stringify(body) : null
      });

      const data = await res.json();
      show(data);

      if (!res.ok) {
        throw new Error(data.error || data.reason || "Request failed");
      }

      return data;
    }

    async function detectIp() {
      try {
        const res = await fetch("/.netlify/functions/ips?action=whoami");
        const data = await res.json();

        const detected = data.ip || "";
        document.getElementById("detectedIp").textContent = detected || "Unknown";
        document.getElementById("currentIp").value = detected;

        if (!document.getElementById("currentLabel").value && detected) {
          document.getElementById("currentLabel").value = detected;
        }

        show(data);
      } catch (err) {
        alert(err.message);
      }
    }

    async function loadIps() {
      try {
        const data = await api("list");
        const rows = data.data || [];

        document.getElementById("ipRows").innerHTML = rows.length
          ? rows.map(row => `
              <tr>
                <td>${escapeHtml(row.ip)}</td>
                <td>${escapeHtml(row.label)}</td>
                <td>${row.active ? "Yes" : "No"}</td>
                <td>${escapeHtml(row.updated_at || "")}</td>
                <td>
                  <button class="${row.active ? "warn" : "ok"}" onclick="toggleIp('${escapeHtml(row.ip)}', ${!row.active})">
                    ${row.active ? "Disable" : "Enable"}
                  </button>
                  <button class="danger" onclick="deleteIp('${escapeHtml(row.ip)}')">Delete</button>
                </td>
              </tr>
            `).join("")
          : `<tr><td colspan="5">No IPs found</td></tr>`;
      } catch (err) {
        alert(err.message);
      }
    }

    async function addCurrentIp() {
      try {
        const ip = document.getElementById("currentIp").value.trim();
        const label = document.getElementById("currentLabel").value.trim() || ip || "Current IP";

        if (!ip) {
          alert("Click Detect IP first, or enter an IP manually.");
          return;
        }

        // Uses manual add endpoint so the exact IP shown in the textbox is added.
        await api("add", "POST", {
          ip,
          label
        });

        await loadIps();
      } catch (err) {
        alert(err.message);
      }
    }

    async function addManualIp() {
      try {
        await api("add", "POST", {
          ip: document.getElementById("manualIp").value.trim(),
          label: document.getElementById("manualLabel").value.trim() || "Manual IP"
        });
        await loadIps();
      } catch (err) {
        alert(err.message);
      }
    }

    async function toggleIp(ip, active) {
      try {
        await api("toggle", "PATCH", { ip, active });
        await loadIps();
      } catch (err) {
        alert(err.message);
      }
    }

    async function deleteIp(ip) {
      if (!confirm(`Delete ${ip}?`)) return;

      try {
        await api("delete", "DELETE", { ip });
        await loadIps();
      } catch (err) {
        alert(err.message);
      }
    }
  </script>
</body>
</html>
