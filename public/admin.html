<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>IP Whitelist Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 22px;
      background: #f7f7f7;
    }
    .box {
      background: white;
      padding: 18px;
      border-radius: 10px;
      max-width: 1000px;
      margin: auto;
      box-shadow: 0 1px 8px rgba(0,0,0,0.08);
    }
    input {
      padding: 10px;
      margin: 4px;
      min-width: 220px;
    }
    button {
      padding: 10px 12px;
      margin: 4px;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      background: white;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 9px;
      text-align: left;
    }
    th {
      background: #efefef;
    }
    .danger {
      background: #d93025;
      color: white;
      border: none;
    }
    .ok {
      background: #137333;
      color: white;
      border: none;
    }
    .warn {
      background: #f9ab00;
      color: black;
      border: none;
    }
    pre {
      background: #111;
      color: #0f0;
      padding: 12px;
      overflow: auto;
      border-radius: 6px;
    }
    .muted {
      color: #555;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>IP Whitelist Manager</h2>

    <p class="muted">
      Paste your admin token once. It will be saved only in this browser's local storage.
    </p>

    <p>
      <input id="token" type="password" placeholder="Admin token" />
      <button onclick="saveToken()">Save Token</button>
      <button onclick="detectIp()">Detect My IP</button>
    </p>

    <p><b>Detected IP:</b> <span id="detectedIp">Not checked</span></p>

    <hr />

    <h3>Add current IP</h3>
    <input id="currentLabel" placeholder="Label, e.g. Office PC" />
    <button class="ok" onclick="addCurrentIp()">Add Current IP</button>

    <h3>Add manual IP</h3>
    <input id="manualIp" placeholder="IP address, e.g. 103.45.67.89" />
    <input id="manualLabel" placeholder="Label, e.g. Client PC" />
    <button class="ok" onclick="addManualIp()">Add Manual IP</button>

    <hr />

    <button onclick="loadIps()">Refresh List</button>

    <table>
      <thead>
        <tr>
          <th>IP</th>
          <th>Label</th>
          <th>Active</th>
          <th>Updated</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="ipRows">
        <tr><td colspan="5">Click Refresh List</td></tr>
      </tbody>
    </table>

    <h3>Result</h3>
    <pre id="result">Ready</pre>
  </div>

  <script>
    const tokenInput = document.getElementById("token");
    const urlToken = new URLSearchParams(location.search).get("token");

    tokenInput.value = urlToken || localStorage.getItem("ADMIN_TOKEN") || "";

    function saveToken() {
      localStorage.setItem("ADMIN_TOKEN", tokenInput.value);
      show({ success: true, message: "Token saved in this browser" });
    }

    function token() {
      return tokenInput.value.trim();
    }

    function show(data) {
      document.getElementById("result").textContent = JSON.stringify(data, null, 2);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function api(action, method = "GET", body = null) {
      const res = await fetch(`/.netlify/functions/ips?action=${encodeURIComponent(action)}`, {
        method,
        headers: {
          "Content-Type": "application/json",
          "x-admin-token": token()
        },
        body: body ? JSON.stringify(body) : null
      });

      const data = await res.json();
      show(data);

      if (!res.ok) {
        throw new Error(data.error || data.reason || "Request failed");
      }

      return data;
    }

    async function detectIp() {
      const res = await fetch("/.netlify/functions/ips?action=whoami");
      const data = await res.json();

      document.getElementById("detectedIp").textContent = data.ip || "Unknown";
      show(data);
    }

    async function loadIps() {
      try {
        const data = await api("list");
        const rows = data.data || [];

        document.getElementById("ipRows").innerHTML = rows.length
          ? rows.map(row => `
              <tr>
                <td>${escapeHtml(row.ip)}</td>
                <td>${escapeHtml(row.label)}</td>
                <td>${row.active ? "Yes" : "No"}</td>
                <td>${escapeHtml(row.updated_at || "")}</td>
                <td>
                  <button class="${row.active ? "warn" : "ok"}" onclick="toggleIp('${escapeHtml(row.ip)}', ${!row.active})">
                    ${row.active ? "Disable" : "Enable"}
                  </button>
                  <button class="danger" onclick="deleteIp('${escapeHtml(row.ip)}')">Delete</button>
                </td>
              </tr>
            `).join("")
          : `<tr><td colspan="5">No IPs found</td></tr>`;
      } catch (err) {
        alert(err.message);
      }
    }

    async function addCurrentIp() {
      try {
        await api("add-current", "POST", {
          label: document.getElementById("currentLabel").value || "Current IP"
        });
        await loadIps();
        await detectIp();
      } catch (err) {
        alert(err.message);
      }
    }

    async function addManualIp() {
      try {
        await api("add", "POST", {
          ip: document.getElementById("manualIp").value,
          label: document.getElementById("manualLabel").value || "Manual IP"
        });
        await loadIps();
      } catch (err) {
        alert(err.message);
      }
    }

    async function toggleIp(ip, active) {
      try {
        await api("toggle", "PATCH", { ip, active });
        await loadIps();
      } catch (err) {
        alert(err.message);
      }
    }

    async function deleteIp(ip) {
      if (!confirm(`Delete ${ip}?`)) return;

      try {
        await api("delete", "DELETE", { ip });
        await loadIps();
      } catch (err) {
        alert(err.message);
      }
    }

    detectIp();
  </script>
</body>
</html>
